name: Build and Push Special Docker Image

on:
  workflow_dispatch: # 仅手动触发

env:
  REGISTRY: quay.io
  IMAGE_NAME: atlas-ci/vllm-atlas-temp

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04-arm
            tag_suffix: arm
          - runner: ubuntu-arm64
            tag_suffix: arm64
      fail-fast: false
    runs-on: ${{ matrix.runner }} # 使用原生 ARM64 runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.a3.openEuler
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:vllm-ascend-8.5.3-a3-openeuler24.03-py3.11-with-patch-260711-${{ matrix.tag_suffix }}
          build-args: |
            SOC_VERSION=ascend910_9391
            VLLM_REPO=https://github.com/vllm-project/vllm.git
            VLLM_TAG=v0.18.0
